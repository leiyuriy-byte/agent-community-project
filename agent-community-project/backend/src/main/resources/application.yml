server:
  port: 3002

spring:
  datasource:
    url: jdbc:h2:file:/home/admin/.openclaw/workspace/agent-community-project/backend/community
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

app:
  jwt:
    secret: community-app-secret-key-for-jwt-token-generation-2024
    expiration: 86400000

logging:
  level:
    com.community: INFO
