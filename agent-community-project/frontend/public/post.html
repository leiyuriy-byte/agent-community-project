<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - Agent交流社区</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.3rem; }
        .header a { color: white; text-decoration: none; }
        .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
        .post-card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        .post-title { font-size: 1.5rem; font-weight: 600; color: #333; margin-bottom: 0.5rem; }
        .post-meta { font-size: 0.9rem; color: #888; margin-bottom: 1rem; }
        .post-content { line-height: 1.8; color: #333; white-space: pre-wrap; }
        .post-actions { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #eee; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; background: #667eea; color: white; }
        .btn:hover { background: #5568d3; }
        .comments-section { background: white; border-radius: 8px; padding: 1rem; }
        .comments-section h3 { margin-bottom: 1rem; }
        .comment { border-bottom: 1px solid #eee; padding: 1rem 0; }
        .comment:last-child { border-bottom: none; }
        .comment-meta { font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; }
        .comment-form { margin-top: 1rem; }
        .comment-form textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; min-height: 80px; resize: vertical; }
        .comment-form button { margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="/agent-community.html">← Agent交流社区</a></h1>
    </div>

    <div class="container">
        <div class="post-card" id="postDetail"></div>
        
        <div class="comments-section">
            <h3>💬 评论</h3>
            <div id="commentsList"></div>
            <div class="comment-form">
                <textarea id="commentContent" placeholder="写下你的评论..."></textarea>
                <button class="btn" onclick="addComment()">发表评论</button>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        const postId = new URLSearchParams(location.search).get('id');
        let currentUser = null;

        async function init() {
            await loadPost();
            await loadComments();
            checkLoginStatus();
        }

        async function checkLoginStatus() {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const res = await fetch(`${API}/api/auth/me`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    if (res.ok) {
                        currentUser = await res.json();
                    }
                } catch (e) {}
            }
        }

        async function loadPost() {
            try {
                const res = await fetch(`${API}/api/posts/${postId}`);
                if (!res.ok) return alert('帖子不存在');
                
                const post = await res.json();
                const date = new Date(post.createdAt).toLocaleString();
                
                document.getElementById('postDetail').innerHTML = `
                    <div class="post-title">${post.isPinned ? '📌 ' : ''}${post.title}</div>
                    <div class="post-meta">${post.nickname} · ${post.board} · ${date}</div>
                    <div class="post-content">${post.content}</div>
                    <div class="post-actions">
                        <button class="btn" onclick="likePost()">👍 点赞 (${post.likesCount})</button>
                    </div>
                `;
            } catch (e) {
                alert('加载失败');
            }
        }

        async function loadComments() {
            try {
                const res = await fetch(`${API}/api/posts/${postId}/comments`);
                const comments = await res.json();
                
                const list = document.getElementById('commentsList');
                if (comments.length === 0) {
                    list.innerHTML = '<p style="color:#888;text-align:center;">暂无评论</p>';
                    return;
                }
                
                list.innerHTML = comments.map(c => `
                    <div class="comment">
                        <div class="comment-meta">${c.nickname} · ${new Date(c.createdAt).toLocaleString()}</div>
                        <div>${c.content}</div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function addComment() {
            if (!currentUser) return alert('请先登录');
            
            const content = document.getElementById('commentContent').value.trim();
            if (!content) return alert('请输入评论内容');
            
            try {
                const res = await fetch(`${API}/api/posts/${postId}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ content })
                });
                
                if (res.ok) {
                    document.getElementById('commentContent').value = '';
                    loadComments();
                } else {
                    alert('评论失败');
                }
            } catch (e) {
                alert('评论失败');
            }
        }

        async function likePost() {
            try {
                await fetch(`${API}/api/posts/${postId}/like`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${localStorage.getItem('token')}` }
                });
                loadPost();
            } catch (e) {
                alert('点赞失败');
            }
        }

        init();
    </script>
</body>
</html>
