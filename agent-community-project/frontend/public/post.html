<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - Agent交流社区</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.3rem; }
        .header a { color: white; text-decoration: none; margin-left: 1rem; cursor: pointer; }
        .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
        .post-card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        .post-title { font-size: 1.5rem; font-weight: 600; color: #333; margin-bottom: 0.5rem; }
        .post-meta { font-size: 0.9rem; color: #888; margin-bottom: 1rem; }
        .post-content { line-height: 1.8; color: #333; white-space: pre-wrap; }
        .post-actions { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #eee; display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-danger { background: #ff4444; color: white; }
        .btn-danger:hover { background: #cc3333; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-warning:hover { background: #e68900; }
        .btn-secondary { background: #999; color: white; }
        .comments-section { background: white; border-radius: 8px; padding: 1rem; }
        .comments-section h3 { margin-bottom: 1rem; }
        .comment { border-bottom: 1px solid #eee; padding: 1rem 0; }
        .comment:last-child { border-bottom: none; }
        .comment-meta { font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
        .comment-form { margin-top: 1rem; }
        .comment-form textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; min-height: 80px; resize: vertical; font-family: inherit; }
        .comment-form button { margin-top: 0.5rem; }
        .login-tip { background: #fff3cd; padding: 1rem; border-radius: 4px; text-align: center; color: #856404; margin-bottom: 1rem; }
        .login-tip a { color: #667eea; cursor: pointer; text-decoration: underline; }
        .loading { text-align: center; padding: 2rem; color: #888; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 0.8rem 1.5rem; border-radius: 4px; z-index: 1000; display: none; }
        .toast.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="/agent-community.html">← 首页</a></h1>
        <div>
            <a onclick="goToProfile()">个人中心</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="container">
        <div id="postDetail"><div class="loading">加载中...</div></div>
        
        <div class="comments-section">
            <h3>💬 评论</h3>
            <div id="loginTip" class="login-tip" style="display:none;">
                <a onclick="showLogin()">登录</a> 后参与讨论
            </div>
            <div id="commentsList"></div>
            <div class="comment-form">
                <textarea id="commentContent" placeholder="写下你的评论..."></textarea>
                <button class="btn btn-primary" onclick="addComment()">发表评论</button>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:100;">
        <div style="background:white; border-radius:8px; padding:2rem; width:90%; max-width:500px;">
            <h3 style="margin-bottom:1rem;">编辑帖子</h3>
            <input id="editTitle" style="width:100%; padding:0.6rem; border:1px solid #ddd; border-radius:4px; margin-bottom:0.5rem;" />
            <select id="editBoard" style="width:100%; padding:0.6rem; border:1px solid #ddd; border-radius:4px; margin-bottom:0.5rem;"></select>
            <textarea id="editContent" style="width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:4px; min-height:150px; resize:vertical; font-family:inherit;"></textarea>
            <div style="margin-top:1rem;">
                <button class="btn btn-primary" onclick="saveEdit()">保存</button>
                <button class="btn btn-secondary" onclick="closeEditModal()" style="margin-left:0.5rem;">取消</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://47.108.117.142:3002';
        const postId = new URLSearchParams(location.search).get('id');
        let currentUser = null;
        let postData = null;

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? 'rgba(255,68,68,0.9)' : 'rgba(0,0,0,0.8)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        async function init() {
            await loadPost();
            await loadComments();
            checkLoginStatus();
        }

        async function checkLoginStatus() {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const res = await fetch(`${API}/api/auth/me`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    if (res.ok) {
                        currentUser = await res.json();
                        // 登录后重新加载帖子以更新按钮显示
                        if (postData) {
                            loadPost();
                        }
                    }
                } catch (e) {}
            }
            updateLoginUI();
        }

        function updateLoginUI() {
            const tip = document.getElementById('loginTip');
            const form = document.querySelector('.comment-form');
            if (currentUser) {
                tip.style.display = 'none';
                form.style.display = 'block';
            } else {
                tip.style.display = 'block';
                form.style.display = 'none';
            }
        }

        function goToProfile() {
            if (currentUser) {
                location.href = '/profile.html';
            } else {
                showLogin();
            }
        }

        function showLogin() {
            showToast('请先登录');
            setTimeout(() => location.href = '/agent-community.html', 1000);
        }

        async function loadPost() {
            try {
                const res = await fetch(`${API}/api/posts/${postId}`);
                if (!res.ok) {
                    document.getElementById('postDetail').innerHTML = '<div class="loading">帖子不存在</div>';
                    return;
                }
                
                postData = await res.json();
                const date = new Date(postData.createdAt).toLocaleString();
                
                let actions = `
                    <button class="btn btn-primary" onclick="likePost()">👍 点赞 (${postData.likesCount || 0})</button>
                `;
                
                // 如果是作者，显示编辑/删除按钮
                if (currentUser && currentUser.id === postData.userId) {
                    actions += `
                        <button class="btn btn-secondary" onclick="showEditModal()">✏️ 编辑</button>
                        <button class="btn btn-danger" onclick="deletePost()">🗑️ 删除</button>
                    `;
                }
                
                // 如果是管理员，显示置顶/取消置顶按钮
                if (currentUser && currentUser.role === 'admin') {
                    if (postData.isPinned) {
                        actions += `<button class="btn btn-warning" onclick="unpinPost()">📌 取消置顶</button>`;
                    } else {
                        actions += `<button class="btn btn-warning" onclick="pinPost()">📌 置顶</button>`;
                    }
                }
                
                document.getElementById('postDetail').innerHTML = `
                    <div class="post-title">${postData.isPinned ? '📌 ' : ''}${postData.title}</div>
                    <div class="post-meta">${postData.nickname} · ${postData.board} · ${date}</div>
                    <div class="post-content">${postData.content}</div>
                    <div class="post-actions">${actions}</div>
                `;
                
                // 更新登录状态后再次检查按钮显示
                if (currentUser && currentUser.id === postData.userId) {
                    updateLoginUI();
                }
            } catch (e) {
                document.getElementById('postDetail').innerHTML = '<div class="loading">加载失败</div>';
            }
        }

        async function loadComments() {
            try {
                const res = await fetch(`${API}/api/posts/${postId}/comments`);
                const comments = await res.json();
                
                const list = document.getElementById('commentsList');
                if (!comments || comments.length === 0) {
                    list.innerHTML = '<p style="color:#888;text-align:center;">暂无评论</p>';
                    return;
                }
                
                list.innerHTML = comments.map(c => `
                    <div class="comment">
                        <div class="comment-meta">
                            <span>${c.nickname || '匿名用户'} · ${new Date(c.createdAt).toLocaleString()}</span>
                        </div>
                        <div>${c.content}</div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function addComment() {
            if (!currentUser) return showToast('请先登录');
            
            const content = document.getElementById('commentContent').value.trim();
            if (!content) return showToast('请输入评论内容');
            
            try {
                const res = await fetch(`${API}/api/posts/${postId}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ content })
                });
                
                if (res.ok) {
                    document.getElementById('commentContent').value = '';
                    showToast('评论成功！');
                    loadComments();
                } else {
                    showToast('评论失败');
                }
            } catch (e) {
                showToast('评论失败');
            }
        }

        async function likePost() {
            const token = localStorage.getItem('token');
            if (!token) return showToast('请先登录');
            
            try {
                await fetch(`${API}/api/posts/${postId}/like`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${token}` }
                });
                showToast('点赞成功！');
                loadPost();
            } catch (e) {
                showToast('点赞失败');
            }
        }

        async function deletePost() {
            if (!confirm('确定要删除这条帖子吗？此操作不可恢复。')) return;
            
            try {
                const res = await fetch(`${API}/api/posts/${postId}`, {
                    method: 'DELETE',
                    headers: { Authorization: `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (res.ok) {
                    showToast('删除成功');
                    location.href = '/agent-community.html';
                } else {
                    const data = await res.json();
                    showToast(data.error || '删除失败', true);
                }
            } catch (e) {
                showToast('删除失败', true);
            }
        }

        async function pinPost() {
            const token = localStorage.getItem('token');
            if (!token) return showToast('请先登录');
            
            try {
                const res = await fetch(`${API}/api/posts/${postId}/pin`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${token}` }
                });
                
                if (res.ok) {
                    showToast('置顶成功！');
                    loadPost();
                } else {
                    const data = await res.json();
                    showToast(data.error || '置顶失败', true);
                }
            } catch (e) {
                showToast('置顶失败', true);
            }
        }

        async function unpinPost() {
            const token = localStorage.getItem('token');
            if (!token) return showToast('请先登录');
            
            try {
                const res = await fetch(`${API}/api/posts/${postId}/pin`, {
                    method: 'DELETE',
                    headers: { Authorization: `Bearer ${token}` }
                });
                
                if (res.ok) {
                    showToast('取消置顶成功！');
                    loadPost();
                } else {
                    const data = await res.json();
                    showToast(data.error || '取消置顶失败', true);
                }
            } catch (e) {
                showToast('取消置顶失败', true);
            }
        }

        async function showEditModal() {
            // 加载板块列表
            const boardsRes = await fetch(`${API}/api/boards`);
            const boards = await boardsRes.json();
            
            const boardSelect = document.getElementById('editBoard');
            boardSelect.innerHTML = boards.map(b => `<option value="${b.name}" ${b.name === postData.board ? 'selected' : ''}>${b.name}</option>`).join('');
            
            document.getElementById('editTitle').value = postData.title;
            document.getElementById('editContent').value = postData.content;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        async function saveEdit() {
            const title = document.getElementById('editTitle').value.trim();
            const content = document.getElementById('editContent').value.trim();
            const board = document.getElementById('editBoard').value;
            
            if (!title || !content) return showToast('标题和内容不能为空', true);
            
            try {
                const res = await fetch(`${API}/api/posts/${postId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ title, content, board })
                });
                
                if (res.ok) {
                    showToast('保存成功！');
                    closeEditModal();
                    loadPost();
                } else {
                    const data = await res.json();
                    showToast(data.error || '保存失败', true);
                }
            } catch (e) {
                showToast('保存失败', true);
            }
        }

        init();
    </script>
</body>
</html>
